services:
  api:
    build:
      context: .
      dockerfile: src/ChatApp.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=chatapp;Username=chatapp;Password=chatapp123
      - Redis__ConnectionString=redis:6379
      - JwtSettings__Secret=${JWT_SECRET:-replace-with-strong-secret-min-32-bytes-123456}
      - JwtSettings__Issuer=ChatApp
      - JwtSettings__Audience=ChatApp.Users
      - JwtSettings__AccessTokenExpirationMinutes=15
      - JwtSettings__RefreshTokenExpirationDays=7
      - Serilog__SeqUrl=http://seq
      - Smtp__Enabled=${SMTP_ENABLED:-false}
      - Smtp__Host=${SMTP_HOST:-smtp.sendgrid.net}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__UseSsl=${SMTP_USE_SSL:-true}
      - Smtp__Username=${SMTP_USERNAME:-apikey}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL:-no-reply@chatapp.local}
      - Smtp__FromName=${SMTP_FROM_NAME:-ChatApp}
    depends_on:
      - postgres
      - redis
      - seq

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=chatapp
      - POSTGRES_USER=chatapp
      - POSTGRES_PASSWORD=chatapp123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  redis_data:
  seq_data:
