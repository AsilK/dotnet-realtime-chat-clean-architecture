services:
  api:
    build:
      context: .
      dockerfile: src/ChatApp.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=chatapp;Username=chatapp;Password=chatapp123
      - Redis__ConnectionString=redis:6379
      - JwtSettings__Secret=${JWT_SECRET:-replace-with-strong-secret-min-32-bytes-123456}
      - JwtSettings__Issuer=ChatApp
      - JwtSettings__Audience=ChatApp.Users
      - JwtSettings__AccessTokenExpirationMinutes=15
      - JwtSettings__RefreshTokenExpirationDays=7
      - Serilog__SeqUrl=http://seq
    depends_on:
      - postgres
      - redis
      - seq

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=chatapp
      - POSTGRES_USER=chatapp
      - POSTGRES_PASSWORD=chatapp123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  redis_data:
  seq_data:
