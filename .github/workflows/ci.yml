name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ChatApp.sln

      - name: Build
        run: dotnet build ChatApp.sln -c Release --no-restore

      - name: Test
        run: dotnet test ChatApp.sln -c Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ChatApp.Web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci
        working-directory: src/ChatApp.Web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/ChatApp.Web

      - name: Run E2E Tests
        run: npm run test:e2e
        working-directory: src/ChatApp.Web

      - name: Upload Playwright Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            src/ChatApp.Web/playwright-report
            src/ChatApp.Web/test-results
          if-no-files-found: ignore
