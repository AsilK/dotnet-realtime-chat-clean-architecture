name: security-scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: "0 4 * * 1"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
